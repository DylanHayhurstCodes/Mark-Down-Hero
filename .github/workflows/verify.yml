name: Mark-Down-Hero Verify
on: [push, pull_request]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify C++ Engine
        run: |
          mkdir -p engine
          echo '#include <iostream>' > engine/saver.cpp
          echo 'int main(){return 0;}' >> engine/saver.cpp
          g++ engine/saver.cpp -o hero_engine

      - name: Verify TS Interface
        run: |
          mkdir -p interface
          echo 'const x: string = "ok";' > interface/preview.ts
          npm install -g typescript
          tsc interface/preview.ts --noEmit --target es6 --skipLibCheck
