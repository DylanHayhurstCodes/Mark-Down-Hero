name: Mark-Down-Hero Verify
on: [push, pull_request]

jobs:
  engine-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile C++ Engine
        run: |
          CPP_FILE=$(find . -name "*.cpp" | head -n 1)
          g++ "$CPP_FILE" -o hero_engine

  interface-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check TypeScript Syntax
        run: |
          npm install -g typescript
          TS_FILE=$(find . -name "*.ts" | head -n 1)
          if [ -n "$TS_FILE" ]; then
            tsc "$TS_FILE" --noEmit --skipLibCheck --target es6
          fi
