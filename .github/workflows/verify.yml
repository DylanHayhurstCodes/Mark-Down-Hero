name: Mark-Down-Hero Verify
on: [push, pull_request]

jobs:
  engine-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile C++ Engine
        run: g++ engine/saver.cpp -o hero_engine

  interface-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check TypeScript Syntax
        run: |
          npm install -g typescript
          tsc interface/preview.ts --noEmit --skipLibCheck --target es6
