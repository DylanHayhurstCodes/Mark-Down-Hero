name: Mark-Down-Hero Verify
on: [push, pull_request]

jobs:
  engine-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile C++ Engine
        # This command searches everywhere for saver.cpp so it never fails
        run: g++ $(find . -name "saver.cpp") -o hero_engine

  interface-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check TypeScript Syntax
        # This command searches everywhere for your .ts file
        run: |
          npm install -g typescript
          TS_FILE=$(find . -name "*.ts" | head -n 1)
          tsc "$TS_FILE" --noEmit --skipLibCheck --target es6
